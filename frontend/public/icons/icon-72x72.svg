<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 72 72">
  <!-- Fundo arredondado -->
  <rect width="72" height="72" rx="15.84" fill="#1A1A1A"/>
  <!-- Círculo laranja gradiente -->
  <defs>
    <radialGradient id="grad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#FF7A00"/>
    </radialGradient>
  </defs>
  <circle cx="36" cy="36" r="28.8" fill="url(#grad)"/>
  <!-- Emoji de doce simplificado como texto -->
  <text x="36" y="44.64" 
        font-size="32.4" 
        text-anchor="middle" 
        font-family="Segoe UI Emoji, Apple Color Emoji, sans-serif">🍬</text>
</svg>